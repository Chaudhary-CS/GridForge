<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GridForge</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700&family=Source+Code+Pro:wght@400;500&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Barlow', system-ui, sans-serif;
            background: #1a1a1a;
            color: #e0e0e0;
            min-height: 100vh;
            font-size: 14px;
        }

        /* ---- HEADER ---- */
        header {
            background: #111;
            border-bottom: 2px solid #76b900;
            padding: 0 28px;
            height: 56px;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .logo-block { display: flex; align-items: center; gap: 10px; }

        .logo-eye {
            width: 32px; height: 32px;
            background: #76b900;
            border-radius: 3px;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; font-weight: 900; color: #111;
            font-family: 'Barlow Condensed', sans-serif;
            letter-spacing: -1px; flex-shrink: 0;
        }

        .logo-name {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 22px; font-weight: 700;
            letter-spacing: 1px; color: #fff; text-transform: uppercase;
        }
        .logo-name span { color: #76b900; }

        .header-tagline {
            color: #555; font-size: 13px;
            border-left: 1px solid #333; padding-left: 16px; margin-left: 4px;
        }

        .header-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }

        .preset-pill {
            background: #76b900; color: #111;
            font-weight: 700; font-size: 13px;
            padding: 4px 14px; border-radius: 2px;
            min-width: 95px; text-align: center;
            transition: background 0.2s;
        }

        .github-link {
            color: #555; text-decoration: none; font-size: 13px;
            transition: color 0.15s;
        }
        .github-link:hover { color: #76b900; }

        /* ---- LAYOUT ---- */
        .container {
            display: grid;
            grid-template-columns: 290px 1fr 400px;
            height: calc(100vh - 56px);
        }

        .panel {
            border-right: 1px solid #2a2a2a;
            overflow-y: auto; padding: 20px;
        }
        .panel:last-child { border-right: none; }

        .panel-title {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 11px; font-weight: 700; color: #76b900;
            text-transform: uppercase; letter-spacing: 2px;
            margin-bottom: 16px; padding-bottom: 8px;
            border-bottom: 1px solid #2a2a2a;
        }

        /* ---- LEFT PANEL ---- */
        .dim-card {
            background: #222;
            border: 1px solid #2a2a2a;
            border-left: 3px solid #76b900;
            padding: 13px; margin-bottom: 10px;
        }

        .dim-header {
            display: flex; justify-content: space-between;
            align-items: center; margin-bottom: 10px;
        }

        .dim-name {
            font-weight: 600; font-size: 12px; color: #fff;
            text-transform: uppercase; letter-spacing: 0.5px;
        }

        .dim-count {
            font-size: 11px; color: #555; margin-left: 6px; font-weight: 400;
        }

        .remove-btn {
            background: none; border: none; color: #444;
            cursor: pointer; font-size: 15px; padding: 2px 6px;
            transition: color 0.15s;
        }
        .remove-btn:hover { color: #f44; }

        .dim-tags { display: flex; flex-wrap: wrap; gap: 5px; }

        .dim-tag {
            background: #1a1a1a; border: 1px solid #76b900;
            color: #76b900; padding: 3px 9px; font-size: 11px;
            font-family: 'Source Code Pro', monospace;
            display: flex; align-items: center; gap: 5px; border-radius: 2px;
        }

        .dim-tag .x { cursor: pointer; opacity: 0.4; transition: opacity 0.15s; }
        .dim-tag .x:hover { opacity: 1; }

        .dim-input-row { display: flex; gap: 5px; margin-top: 9px; }

        input, select {
            background: #1a1a1a; border: 1px solid #333;
            color: #e0e0e0; padding: 6px 9px; font-size: 13px;
            font-family: 'Barlow', sans-serif; outline: none;
            border-radius: 2px; transition: border-color 0.15s;
        }
        input:focus, select:focus { border-color: #76b900; }
        .dim-input-row input { flex: 1; min-width: 0; }

        .btn {
            border: none; padding: 6px 13px; font-size: 13px; font-weight: 600;
            cursor: pointer; border-radius: 2px; transition: background 0.15s;
            white-space: nowrap; font-family: 'Barlow', sans-serif;
        }
        .btn-green { background: #76b900; color: #111; }
        .btn-green:hover { background: #8fd100; }
        .btn-dark { background: #2a2a2a; color: #bbb; border: 1px solid #363636; }
        .btn-dark:hover { background: #333; }

        .add-dim-section {
            margin-top: 16px; padding-top: 14px; border-top: 1px solid #2a2a2a;
        }
        .add-dim-section label {
            font-size: 10px; color: #555; display: block;
            margin-bottom: 7px; text-transform: uppercase; letter-spacing: 1px;
        }
        .add-dim-row { display: flex; gap: 5px; }
        .add-dim-row select { flex: 1; }

        .options-section {
            margin-top: 18px; padding-top: 14px; border-top: 1px solid #2a2a2a;
        }
        .option-row {
            display: flex; align-items: center;
            justify-content: space-between; margin-bottom: 9px;
        }
        .option-row label { font-size: 12px; color: #888; }
        .option-row select { width: 140px; }

        /* ---- CENTER PANEL ---- */

        /* progress bar */
        .progress-section { margin-bottom: 18px; }

        .progress-row {
            display: flex; justify-content: space-between;
            align-items: baseline; margin-bottom: 6px;
        }

        .progress-label { font-size: 12px; color: #888; }

        .progress-fraction {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 20px; font-weight: 700; color: #76b900;
        }

        .progress-fraction .denom { color: #444; font-size: 14px; }

        .progress-bar-bg {
            height: 4px; background: #2a2a2a; border-radius: 2px; overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%; background: #76b900;
            transition: width 0.3s ease; border-radius: 2px;
        }

        /* coverage pills */
        .coverage-section { margin-bottom: 18px; }

        .coverage-title {
            font-size: 10px; color: #555; text-transform: uppercase;
            letter-spacing: 1px; margin-bottom: 7px;
        }

        .coverage-pills { display: flex; flex-wrap: wrap; gap: 5px; }

        .cov-pill {
            font-size: 11px; padding: 2px 8px; border-radius: 2px;
            font-family: 'Source Code Pro', monospace;
            border: 1px solid;
        }
        .cov-full { background: #1e2a0e; border-color: #3a5a0a; color: #76b900; }
        .cov-partial { background: #2a200a; border-color: #5a4a0a; color: #c8920a; }
        .cov-none { background: #2a1010; border-color: #5a2a2a; color: #884444; }

        /* 2D matrix table */
        .matrix-table-wrap { overflow-x: auto; }

        .matrix-table {
            border-collapse: collapse;
            width: 100%;
        }

        .matrix-table th {
            font-family: 'Source Code Pro', monospace;
            font-size: 11px; font-weight: 500;
            color: #76b900; padding: 6px 10px;
            text-align: center; white-space: nowrap;
            border-bottom: 1px solid #2a2a2a;
        }

        .matrix-table th.row-header-th {
            color: #555; text-align: left;
            font-size: 10px; letter-spacing: 1px; text-transform: uppercase;
        }

        .matrix-table td {
            padding: 4px 6px; border: 1px solid #222;
        }

        .matrix-table tr:hover td { background: #1e1e1e; }

        .row-label {
            font-family: 'Source Code Pro', monospace;
            font-size: 11px; color: #888; white-space: nowrap;
            padding-right: 12px; border-right: 1px solid #2a2a2a;
        }

        .matrix-cell-btn {
            display: flex; align-items: center; justify-content: center;
            width: 100%; min-width: 80px; padding: 7px 10px;
            cursor: pointer; border: 1px solid transparent;
            border-radius: 2px; transition: all 0.12s;
            font-family: 'Source Code Pro', monospace;
            font-size: 10px; user-select: none;
        }

        .matrix-cell-btn.active {
            background: #1e2a0e; border-color: #3a5a0a; color: #a0d020;
        }
        .matrix-cell-btn.active::before {
            content: '●'; margin-right: 5px; color: #76b900;
        }

        .matrix-cell-btn.excluded {
            background: #1a1a1a; border-color: #252525; color: #3a3a3a;
            text-decoration: line-through;
        }
        .matrix-cell-btn.excluded::before {
            content: '○'; margin-right: 5px; color: #333;
        }

        .matrix-cell-btn:hover {
            border-color: #76b900 !important;
            color: #ccc !important;
        }

        /* list fallback for 1 dimension */
        .matrix-list { display: flex; flex-direction: column; gap: 4px; }

        .list-cell {
            display: flex; align-items: center; padding: 9px 13px;
            cursor: pointer; border: 1px solid transparent;
            border-radius: 2px; transition: all 0.12s;
            font-family: 'Source Code Pro', monospace; font-size: 12px;
            user-select: none;
        }
        .list-cell.active {
            background: #1e2a0e; border-color: #3a5a0a; color: #a0d020;
        }
        .list-cell.excluded {
            background: #1a1a1a; border-color: #252525;
            color: #3a3a3a; text-decoration: line-through;
        }
        .list-cell:hover { border-color: #76b900 !important; color: #ccc !important; }

        .cell-dot {
            width: 7px; height: 7px; border-radius: 50%;
            margin-right: 9px; flex-shrink: 0;
        }
        .active .cell-dot { background: #76b900; }
        .excluded .cell-dot { background: #2a2a2a; }

        .empty-state {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; height: 200px; color: #444;
            font-size: 13px; text-align: center; gap: 8px;
        }

        /* ---- RIGHT PANEL ---- */
        .action-bar { display: flex; gap: 8px; margin-bottom: 10px; align-items: center; }

        .json-info {
            margin-left: auto; font-size: 11px; color: #555;
        }

        .json-preview {
            background: #111; border: 1px solid #2a2a2a;
            padding: 14px;
            font-family: 'Source Code Pro', monospace;
            font-size: 11px; line-height: 1.65;
            overflow: auto; white-space: pre;
            height: calc(100vh - 188px); border-radius: 2px;
        }

        .json-empty {
            display: flex; align-items: center; justify-content: center;
            height: 100%; color: #444;
            font-family: 'Barlow', sans-serif; font-size: 13px;
        }

        /* json highlight classes */
        .jk { color: #76b900; }
        .js { color: #c8e6a0; }
        .jn { color: #b0c4ff; }
        .jb { color: #ff9a3c; }

        /* flash animation for new/changed lines */
        @keyframes lineFlash {
            0%   { background: rgba(118, 185, 0, 0.25); }
            100% { background: transparent; }
        }
        .json-flash { animation: lineFlash 0.8s ease-out; }

        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: #1a1a1a; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #76b900; }
    </style>
</head>
<body>

<header>
    <div class="logo-block">
        <div class="logo-eye">GF</div>
        <div class="logo-name">Grid<span>Forge</span></div>
    </div>
    <span class="header-tagline">CMake preset matrix generator</span>
    <div class="header-right">
        <a class="github-link" href="https://github.com/Chaudhary-CS/GridForge" target="_blank">⌥ GitHub</a>
        <div class="preset-pill" id="presetCount">0 presets</div>
    </div>
</header>

<div class="container">

    <!-- LEFT: config -->
    <div class="panel">
        <div class="panel-title">Dimensions</div>
        <div id="dimensionsList"></div>

        <div class="add-dim-section">
            <label>Add dimension</label>
            <div class="add-dim-row">
                <select id="newDimSelect">
                    <option value="os">os</option>
                    <option value="build_type">build_type</option>
                    <option value="cuda_arch">cuda_arch</option>
                    <option value="custom">custom...</option>
                </select>
                <input type="text" id="customDimName" placeholder="name" style="display:none;width:80px;">
                <button class="btn btn-green" onclick="addDimension()">+ Add</button>
            </div>
        </div>

        <div class="options-section">
            <div class="panel-title">Options</div>
            <div class="option-row">
                <label>Toolchain</label>
                <select id="toolchainSelect" onchange="regenerate()">
                    <option value="">None</option>
                    <option value="vcpkg">vcpkg</option>
                    <option value="conan">Conan</option>
                </select>
            </div>
            <div class="option-row">
                <label>Default Generator</label>
                <select id="generatorSelect" onchange="regenerate()">
                    <option value="Ninja">Ninja</option>
                    <option value="Unix Makefiles">Unix Makefiles</option>
                    <option value="Visual Studio 17 2022">VS 2022</option>
                </select>
            </div>
        </div>
    </div>

    <!-- CENTER: matrix -->
    <div class="panel">
        <div class="panel-title">Preset Matrix</div>

        <!-- progress bar -->
        <div class="progress-section" id="progressSection" style="display:none">
            <div class="progress-row">
                <span class="progress-label">Active presets</span>
                <span class="progress-fraction">
                    <span id="progActive">0</span>
                    <span class="denom"> / <span id="progTotal">0</span></span>
                </span>
            </div>
            <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
            </div>
        </div>

        <!-- coverage pills -->
        <div class="coverage-section" id="coverageSection" style="display:none">
            <div class="coverage-title">Coverage</div>
            <div class="coverage-pills" id="coveragePills"></div>
        </div>

        <!-- the actual grid -->
        <div id="matrixArea">
            <div class="empty-state">
                <span style="font-size:20px;color:#333">←</span>
                Add dimensions on the left to build your matrix
            </div>
        </div>
    </div>

    <!-- RIGHT: json -->
    <div class="panel">
        <div class="panel-title">Generated CMakePresets.json</div>
        <div class="action-bar">
            <button class="btn btn-green" id="copyBtn" onclick="copyJson()">Copy JSON</button>
            <button class="btn btn-dark" onclick="downloadJson()">Download</button>
            <span class="json-info" id="jsonInfo"></span>
        </div>
        <div class="json-preview" id="jsonPreview">
            <div class="json-empty">Configure your matrix to see output</div>
        </div>
    </div>
</div>

<script>
// ---- state ----
let dimensions = {};
let excludedPresets = new Set();
let lastGeneratedJson = "";
let prevJsonLines = [];   // used for flash animation

const SUGGESTED = {
    "os":         ["linux", "windows"],
    "build_type": ["Release", "Debug"],
    "cuda_arch":  ["sm_75", "sm_86", "sm_90"],
};

// replicate core.py make_preset_name in JS
// so we can look up preset names from row+col combos on the client
function makePresetName(combo) {
    return Object.values(combo).map(v => String(v).toLowerCase()).join("-");
}

// ---- dimension UI ----
document.getElementById("newDimSelect").addEventListener("change", function() {
    document.getElementById("customDimName").style.display =
        this.value === "custom" ? "block" : "none";
});

function addDimension() {
    let sel = document.getElementById("newDimSelect");
    let name = sel.value;
    if (name === "custom") {
        name = document.getElementById("customDimName").value.trim();
        if (!name) { alert("Enter a name"); return; }
    }
    if (dimensions[name]) { alert("Already added"); return; }
    dimensions[name] = SUGGESTED[name] ? [...SUGGESTED[name]] : [];
    renderDimensions();
    regenerate();
}

function removeDimension(name) {
    delete dimensions[name];
    excludedPresets.clear();
    renderDimensions();
    regenerate();
}

function addValue(dimName) {
    let input = document.getElementById("val-" + dimName);
    let val = input.value.trim();
    if (!val || dimensions[dimName].includes(val)) { input.value = ""; return; }
    dimensions[dimName].push(val);
    input.value = "";
    renderDimensions();
    regenerate();
}

function removeValue(dimName, val) {
    dimensions[dimName] = dimensions[dimName].filter(v => v !== val);
    excludedPresets.clear();
    renderDimensions();
    regenerate();
}

function renderDimensions() {
    let container = document.getElementById("dimensionsList");
    container.innerHTML = "";
    for (let [name, values] of Object.entries(dimensions)) {
        let card = document.createElement("div");
        card.className = "dim-card";
        let tagsHtml = values.map(v =>
            `<span class="dim-tag">${v}<span class="x" onclick="removeValue('${name}','${v}')">×</span></span>`
        ).join("") || `<span style="color:#444;font-size:11px">no values yet</span>`;
        card.innerHTML = `
            <div class="dim-header">
                <span class="dim-name">${name}<span class="dim-count">${values.length} values</span></span>
                <button class="remove-btn" onclick="removeDimension('${name}')">✕</button>
            </div>
            <div class="dim-tags">${tagsHtml}</div>
            <div class="dim-input-row">
                <input type="text" id="val-${name}" placeholder="add value..."
                       onkeydown="if(event.key==='Enter') addValue('${name}')">
                <button class="btn btn-green" onclick="addValue('${name}')">+</button>
            </div>`;
        container.appendChild(card);
    }
}

// ---- toggle ----
function togglePreset(name) {
    excludedPresets.has(name) ? excludedPresets.delete(name) : excludedPresets.add(name);
    regenerate();
}

// ---- main update ----
async function regenerate() {
    let dimNames = Object.keys(dimensions);
    let hasValues = dimNames.length > 0 && Object.values(dimensions).some(v => v.length > 0);

    if (!hasValues) {
        document.getElementById("matrixArea").innerHTML =
            '<div class="empty-state"><span style="font-size:20px;color:#333">←</span>Add dimensions on the left to build your matrix</div>';
        document.getElementById("jsonPreview").innerHTML =
            '<div class="json-empty">Configure your matrix to see output</div>';
        document.getElementById("progressSection").style.display = "none";
        document.getElementById("coverageSection").style.display = "none";
        document.getElementById("presetCount").textContent = "0 presets";
        document.getElementById("jsonInfo").textContent = "";
        return;
    }

    let payload = {
        dimensions,
        excluded: Array.from(excludedPresets),
        toolchain: document.getElementById("toolchainSelect").value || null,
        generator: document.getElementById("generatorSelect").value,
        cache_variables: {},
    };

    let [expandResp, genResp] = await Promise.all([
        fetch("/api/expand", { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({dimensions}) }),
        fetch("/api/generate", { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify(payload) }),
    ]);

    let expandData = await expandResp.json();
    let genData    = await genResp.json();
    if (genData.error) {
        document.getElementById("jsonPreview").textContent = "Error: " + genData.error;
        return;
    }

    let total  = expandData.names.length;
    let active = genData.num_configure;

    // update progress
    document.getElementById("progressSection").style.display = "block";
    document.getElementById("progActive").textContent = active;
    document.getElementById("progTotal").textContent  = total;
    document.getElementById("progressFill").style.width = (total > 0 ? (active/total*100) : 0) + "%";

    // update coverage pills
    renderCoverage(expandData.combos, expandData.names);

    // render the 2D matrix
    renderMatrix(expandData.names, expandData.combos);

    // update JSON with flash animation on changed lines
    let newJson = genData.presets_json;
    renderJsonWithFlash(newJson);
    lastGeneratedJson = newJson;

    document.getElementById("presetCount").textContent = active + " preset" + (active !== 1 ? "s" : "");
    document.getElementById("jsonInfo").textContent = active + " configure · " + genData.num_build + " build";
}

// ---- coverage pills ----
function renderCoverage(combos, names) {
    let dimNames = Object.keys(dimensions);
    let pills = [];

    for (let dim of dimNames) {
        let values = dimensions[dim];
        for (let val of values) {
            // a value is "covered" if at least one active (non-excluded) preset has it
            let coveredCount = 0;
            let totalCount   = 0;
            for (let i = 0; i < combos.length; i++) {
                if (combos[i][dim] === val) {
                    totalCount++;
                    if (!excludedPresets.has(names[i])) coveredCount++;
                }
            }
            let cls = coveredCount === totalCount ? "cov-full"
                    : coveredCount > 0            ? "cov-partial"
                    :                               "cov-none";
            let icon = coveredCount === totalCount ? "✓"
                     : coveredCount > 0            ? "~"
                     :                               "✗";
            pills.push(`<span class="cov-pill ${cls}">${icon} ${val}</span>`);
        }
    }

    document.getElementById("coverageSection").style.display = "block";
    document.getElementById("coveragePills").innerHTML = pills.join("");
}

// ---- 2D matrix render ----
function renderMatrix(names, combos) {
    let area = document.getElementById("matrixArea");
    let dimNames = Object.keys(dimensions);

    if (dimNames.length === 0) return;

    // with only 1 dimension, just show a simple list
    if (dimNames.length === 1) {
        renderList(names, combos, area);
        return;
    }

    // pick column dimension = second dimension added
    // rows = all other dimensions combined
    let colDim    = dimNames[1];
    let colValues = dimensions[colDim];
    let rowDims   = dimNames.filter(d => d !== colDim);

    // collect unique row combos (in original combo order)
    let rowCombos = [];
    let seen = new Set();
    for (let c of combos) {
        let rowObj = {};
        for (let d of rowDims) rowObj[d] = c[d];
        let key = rowDims.map(d => c[d]).join("|");
        if (!seen.has(key)) { seen.add(key); rowCombos.push(rowObj); }
    }

    // build table
    let html = `<div class="matrix-table-wrap"><table class="matrix-table"><thead><tr>`;
    html += `<th class="row-header-th">${rowDims.join(" / ")}</th>`;
    for (let cv of colValues) {
        html += `<th>${cv}</th>`;
    }
    html += `</tr></thead><tbody>`;

    for (let rowCombo of rowCombos) {
        // row label
        let rowLabel = rowDims.map(d => rowCombo[d]).join(" / ");
        html += `<tr><td class="row-label">${rowLabel}</td>`;

        for (let cv of colValues) {
            // reconstruct full combo in original dim order
            let fullCombo = {};
            for (let d of dimNames) {
                fullCombo[d] = (d === colDim) ? cv : rowCombo[d];
            }
            let presetName = makePresetName(fullCombo);
            let isExcluded = excludedPresets.has(presetName);
            let cls = isExcluded ? "excluded" : "active";
            html += `<td><div class="matrix-cell-btn ${cls}"
                          onclick="togglePreset('${presetName}')"
                          title="${presetName}">${presetName}</div></td>`;
        }
        html += `</tr>`;
    }

    html += `</tbody></table></div>`;
    area.innerHTML = html;
}

function renderList(names, combos, area) {
    let html = `<div class="matrix-list">`;
    for (let i = 0; i < names.length; i++) {
        let name = names[i];
        let cls  = excludedPresets.has(name) ? "excluded" : "active";
        html += `<div class="list-cell ${cls}" onclick="togglePreset('${name}')">
                     <div class="cell-dot"></div>${name}
                 </div>`;
    }
    html += `</div>`;
    area.innerHTML = html;
}

// ---- JSON with flash on changed lines ----
function renderJsonWithFlash(newJson) {
    let newLines  = newJson.split("\n");
    let oldLines  = prevJsonLines;
    prevJsonLines = newLines;

    let changedSet = new Set();
    let maxLen = Math.max(newLines.length, oldLines.length);
    for (let i = 0; i < maxLen; i++) {
        if (newLines[i] !== oldLines[i]) changedSet.add(i);
    }

    let highlighted = newLines.map((line, i) => {
        let escaped = line
            .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

        // syntax colour
        escaped = escaped.replace(/"([^"]+)"(\s*:)/g, '<span class="jk">"$1"</span>$2');
        escaped = escaped.replace(/:\s*"([^"]*)"/g, (_, v) => ': <span class="js">"' + v + '"</span>');
        escaped = escaped.replace(/:\s*(\d+)/g, ': <span class="jn">$1</span>');
        escaped = escaped.replace(/:\s*(true|false)/g, ': <span class="jb">$1</span>');

        let cls = changedSet.has(i) ? ' class="json-flash"' : '';
        return `<span${cls}>${escaped}</span>`;
    }).join("\n");

    document.getElementById("jsonPreview").innerHTML = highlighted;
}

// ---- copy / download ----
function copyJson() {
    if (!lastGeneratedJson) return;
    navigator.clipboard.writeText(lastGeneratedJson).then(() => {
        let btn = document.getElementById("copyBtn");
        btn.textContent = "Copied ✓";
        btn.style.background = "#5a8f00";
        setTimeout(() => { btn.textContent = "Copy JSON"; btn.style.background = ""; }, 1500);
    });
}

function downloadJson() {
    if (!lastGeneratedJson) return;
    let blob = new Blob([lastGeneratedJson], {type:"application/json"});
    let url  = URL.createObjectURL(blob);
    let a    = document.createElement("a");
    a.href   = url; a.download = "CMakePresets.json"; a.click();
    URL.revokeObjectURL(url);
}
