<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GridForge</title>
    <style>
        /* NVIDIA-inspired theme
           primary green: #76b900
           dark bg: #1a1a1a
           panel bg: #222222
           border: #333
           text: #e0e0e0
           muted: #888
        */

        @import url('https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700&family=Source+Code+Pro:wght@400;500&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Barlow', 'Segoe UI', system-ui, sans-serif;
            background: #1a1a1a;
            color: #e0e0e0;
            min-height: 100vh;
            font-size: 14px;
        }

        /* ---- HEADER ---- */
        header {
            background: #111111;
            border-bottom: 2px solid #76b900;
            padding: 0 28px;
            height: 56px;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .logo-block {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* NVIDIA-style eye icon */
        .logo-eye {
            width: 32px;
            height: 32px;
            background: #76b900;
            border-radius: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 900;
            color: #111;
            font-family: 'Barlow Condensed', sans-serif;
            letter-spacing: -1px;
            flex-shrink: 0;
        }

        .logo-name {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 1px;
            color: #ffffff;
            text-transform: uppercase;
        }

        .logo-name span {
            color: #76b900;
        }

        .header-tagline {
            color: #666;
            font-size: 13px;
            margin-left: 4px;
            border-left: 1px solid #333;
            padding-left: 16px;
        }

        .header-right {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .preset-pill {
            background: #76b900;
            color: #111;
            font-weight: 700;
            font-size: 13px;
            padding: 4px 14px;
            border-radius: 2px;
            letter-spacing: 0.5px;
            min-width: 90px;
            text-align: center;
        }

        .github-link {
            color: #888;
            text-decoration: none;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: color 0.15s;
        }
        .github-link:hover { color: #76b900; }

        /* ---- LAYOUT ---- */
        .container {
            display: grid;
            grid-template-columns: 300px 1fr 420px;
            height: calc(100vh - 56px);
        }

        .panel {
            border-right: 1px solid #2e2e2e;
            overflow-y: auto;
            padding: 20px;
        }
        .panel:last-child { border-right: none; }

        .panel-title {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 11px;
            font-weight: 700;
            color: #76b900;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 1px solid #2e2e2e;
        }

        /* ---- LEFT PANEL ---- */
        .dim-card {
            background: #252525;
            border: 1px solid #2e2e2e;
            border-left: 3px solid #76b900;
            padding: 14px;
            margin-bottom: 10px;
        }

        .dim-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .dim-name {
            font-weight: 600;
            font-size: 13px;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .remove-btn {
            background: none;
            border: none;
            color: #555;
            cursor: pointer;
            font-size: 16px;
            line-height: 1;
            padding: 2px 6px;
            transition: color 0.15s;
        }
        .remove-btn:hover { color: #ff4444; }

        .dim-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .dim-tag {
            background: #1a1a1a;
            border: 1px solid #76b900;
            color: #76b900;
            padding: 3px 10px;
            font-size: 12px;
            font-family: 'Source Code Pro', monospace;
            display: flex;
            align-items: center;
            gap: 6px;
            border-radius: 2px;
        }

        .dim-tag .x {
            cursor: pointer;
            opacity: 0.5;
            font-size: 13px;
            transition: opacity 0.15s;
        }
        .dim-tag .x:hover { opacity: 1; }

        .dim-input-row {
            display: flex;
            gap: 6px;
            margin-top: 10px;
        }

        input, select {
            background: #1a1a1a;
            border: 1px solid #333;
            color: #e0e0e0;
            padding: 7px 10px;
            font-size: 13px;
            font-family: 'Barlow', sans-serif;
            outline: none;
            border-radius: 2px;
            transition: border-color 0.15s;
        }
        input:focus, select:focus { border-color: #76b900; }

        .dim-input-row input { flex: 1; min-width: 0; }

        .btn {
            border: none;
            padding: 7px 14px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 2px;
            transition: background 0.15s;
            white-space: nowrap;
            font-family: 'Barlow', sans-serif;
        }

        .btn-green {
            background: #76b900;
            color: #111;
        }
        .btn-green:hover { background: #8fd100; }

        .btn-dark {
            background: #2e2e2e;
            color: #ccc;
            border: 1px solid #3a3a3a;
        }
        .btn-dark:hover { background: #383838; }

        .add-dim-section {
            margin-top: 18px;
            padding-top: 16px;
            border-top: 1px solid #2e2e2e;
        }

        .add-dim-section label {
            font-size: 11px;
            color: #666;
            display: block;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .add-dim-row {
            display: flex;
            gap: 6px;
        }

        .add-dim-row select { flex: 1; }

        .options-section {
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid #2e2e2e;
        }

        .option-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .option-row label {
            font-size: 12px;
            color: #999;
        }

        .option-row select { width: 145px; }

        /* ---- CENTER PANEL ---- */
        .matrix-stats {
            display: flex;
            gap: 20px;
            margin-bottom: 16px;
        }

        .stat {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .stat-label {
            font-size: 10px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-value {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 24px;
            font-weight: 700;
            color: #76b900;
            line-height: 1;
        }

        .stat-value.excluded { color: #555; }
        .stat-value.total { color: #ccc; }

        .matrix-grid {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .matrix-cell {
            display: flex;
            align-items: center;
            padding: 10px 14px;
            cursor: pointer;
            border: 1px solid transparent;
            transition: all 0.12s;
            user-select: none;
            border-radius: 2px;
            font-family: 'Source Code Pro', monospace;
            font-size: 12px;
        }

        .matrix-cell .cell-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 10px;
            flex-shrink: 0;
        }

        .matrix-cell.active {
            background: #1e2a0e;
            border-color: #3a5a0a;
            color: #a0d020;
        }

        .matrix-cell.active .cell-dot {
            background: #76b900;
        }

        .matrix-cell.excluded {
            background: #1e1e1e;
            border-color: #2a2a2a;
            color: #444;
            text-decoration: line-through;
        }

        .matrix-cell.excluded .cell-dot {
            background: #333;
        }

        .matrix-cell:hover {
            border-color: #76b900 !important;
            color: #e0e0e0 !important;
        }

        .cell-hint {
            margin-left: auto;
            font-size: 10px;
            color: #555;
            font-family: 'Barlow', sans-serif;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 200px;
            color: #444;
            font-size: 13px;
            text-align: center;
            gap: 8px;
        }

        .empty-state .hint-arrow {
            font-size: 20px;
            color: #333;
        }

        /* ---- RIGHT PANEL ---- */
        .action-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }

        .json-preview {
            background: #111;
            border: 1px solid #2e2e2e;
            padding: 16px;
            font-family: 'Source Code Pro', monospace;
            font-size: 11.5px;
            line-height: 1.65;
            overflow: auto;
            white-space: pre;
            height: calc(100vh - 190px);
            border-radius: 2px;
        }

        .json-empty {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #444;
            font-family: 'Barlow', sans-serif;
            font-size: 13px;
        }

        /* syntax highlighting */
        .jk { color: #76b900; }       /* key - nvidia green */
        .js { color: #c8e6a0; }       /* string value - light green */
        .jn { color: #b0c4ff; }       /* number */
        .jb { color: #ff9a3c; }       /* bool */
        .jp { color: #888; }          /* punctuation */

        /* scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #1a1a1a; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #76b900; }
    </style>
</head>
<body>

<!-- HEADER -->
<header>
    <div class="logo-block">
        <div class="logo-eye">GF</div>
        <div class="logo-name">Grid<span>Forge</span></div>
    </div>
    <span class="header-tagline">CMake preset matrix generator</span>
    <div class="header-right">
        <a class="github-link" href="https://github.com/Chaudhary-CS/GridForge" target="_blank">
            ⌥ GitHub
        </a>
        <div class="preset-pill" id="presetCount">0 presets</div>
    </div>
</header>

<div class="container">

    <!-- LEFT: config -->
    <div class="panel">
        <div class="panel-title">Dimensions</div>

        <div id="dimensionsList"></div>

        <div class="add-dim-section">
            <label>Add dimension</label>
            <div class="add-dim-row">
                <select id="newDimSelect">
                    <option value="os">os</option>
                    <option value="build_type">build_type</option>
                    <option value="cuda_arch">cuda_arch</option>
                    <option value="custom">custom...</option>
                </select>
                <input type="text" id="customDimName" placeholder="name" style="display:none; width:90px;">
                <button class="btn btn-green" onclick="addDimension()">+ Add</button>
            </div>
        </div>

        <div class="options-section">
            <div class="panel-title">Options</div>
            <div class="option-row">
                <label>Toolchain</label>
                <select id="toolchainSelect" onchange="regenerate()">
                    <option value="">None</option>
                    <option value="vcpkg">vcpkg</option>
                    <option value="conan">Conan</option>
                </select>
            </div>
            <div class="option-row">
                <label>Default Generator</label>
                <select id="generatorSelect" onchange="regenerate()">
                    <option value="Ninja">Ninja</option>
                    <option value="Unix Makefiles">Unix Makefiles</option>
                    <option value="Visual Studio 17 2022">VS 2022</option>
                </select>
            </div>
        </div>
    </div>

    <!-- CENTER: matrix grid -->
    <div class="panel">
        <div class="panel-title">Preset Matrix</div>

        <div class="matrix-stats">
            <div class="stat">
                <span class="stat-label">Active</span>
                <span class="stat-value" id="activeCount">0</span>
            </div>
            <div class="stat">
                <span class="stat-label">Excluded</span>
                <span class="stat-value excluded" id="excludedCount">0</span>
            </div>
            <div class="stat">
                <span class="stat-label">Total</span>
                <span class="stat-value total" id="totalCount">0</span>
            </div>
        </div>

        <div id="matrixGrid" class="matrix-grid">
            <div class="empty-state">
                <span class="hint-arrow">←</span>
                Add dimensions on the left to generate your preset matrix
            </div>
        </div>
    </div>

    <!-- RIGHT: json output -->
    <div class="panel">
        <div class="panel-title">Generated CMakePresets.json</div>
        <div class="action-bar">
            <button class="btn btn-green" onclick="copyJson()">Copy JSON</button>
            <button class="btn btn-dark" onclick="downloadJson()">Download</button>
        </div>
        <div class="json-preview" id="jsonPreview">
            <div class="json-empty">Configure your matrix to see output</div>
        </div>
    </div>
</div>

<script>
// -- state --
let dimensions = {};
let excludedPresets = new Set();
let lastGeneratedJson = "";

const SUGGESTED_VALUES = {
    "os": ["linux", "windows"],
    "build_type": ["Release", "Debug"],
    "cuda_arch": ["sm_75", "sm_86", "sm_90"],
};

document.getElementById("newDimSelect").addEventListener("change", function() {
    document.getElementById("customDimName").style.display =
        this.value === "custom" ? "block" : "none";
});

function addDimension() {
    let select = document.getElementById("newDimSelect");
    let dimName = select.value;

    if (dimName === "custom") {
        dimName = document.getElementById("customDimName").value.trim();
        if (!dimName) { alert("Enter a dimension name"); return; }
    }

    if (dimensions[dimName]) { alert("'" + dimName + "' already added"); return; }

    dimensions[dimName] = SUGGESTED_VALUES[dimName]
        ? [...SUGGESTED_VALUES[dimName]]
        : [];

    renderDimensions();
    regenerate();
}

function removeDimension(name) {
    delete dimensions[name];
    excludedPresets.clear();
    renderDimensions();
    regenerate();
}

function addValue(dimName) {
    let input = document.getElementById("input-" + dimName);
    let val = input.value.trim();
    if (!val || dimensions[dimName].includes(val)) { input.value = ""; return; }
    dimensions[dimName].push(val);
    input.value = "";
    renderDimensions();
    regenerate();
}

function removeValue(dimName, val) {
    dimensions[dimName] = dimensions[dimName].filter(v => v !== val);
    excludedPresets.clear();
    renderDimensions();
    regenerate();
}

function renderDimensions() {
    let container = document.getElementById("dimensionsList");
    container.innerHTML = "";

    for (let [name, values] of Object.entries(dimensions)) {
        let card = document.createElement("div");
        card.className = "dim-card";

        let tagsHtml = values.map(v =>
            `<span class="dim-tag">${v}<span class="x" onclick="removeValue('${name}','${v}')">×</span></span>`
        ).join("");

        card.innerHTML = `
            <div class="dim-header">
                <span class="dim-name">${name}</span>
                <button class="remove-btn" onclick="removeDimension('${name}')">✕</button>
            </div>
            <div class="dim-tags">${tagsHtml || '<span style="color:#555;font-size:12px">no values yet</span>'}</div>
            <div class="dim-input-row">
                <input type="text" id="input-${name}" placeholder="add value..."
                       onkeydown="if(event.key==='Enter') addValue('${name}')">
                <button class="btn btn-green" onclick="addValue('${name}')">+</button>
            </div>
        `;
        container.appendChild(card);
    }
}

function togglePreset(name) {
    excludedPresets.has(name) ? excludedPresets.delete(name) : excludedPresets.add(name);
    regenerate();
}

async function regenerate() {
    let hasValues = Object.values(dimensions).some(v => v.length > 0);
    if (!hasValues || Object.keys(dimensions).length === 0) {
        document.getElementById("matrixGrid").innerHTML =
            '<div class="empty-state"><span class="hint-arrow">←</span>Add dimensions on the left to generate your preset matrix</div>';
        document.getElementById("jsonPreview").innerHTML =
            '<div class="json-empty">Configure your matrix to see output</div>';
        updateStats(0, 0);
        document.getElementById("presetCount").textContent = "0 presets";
        return;
    }

    let payload = {
        dimensions,
        excluded: Array.from(excludedPresets),
        toolchain: document.getElementById("toolchainSelect").value || null,
        generator: document.getElementById("generatorSelect").value,
        cache_variables: {},
    };

    let [expandResp, genResp] = await Promise.all([
        fetch("/api/expand", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({dimensions}),
        }),
        fetch("/api/generate", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(payload),
        }),
    ]);

    let expandData = await expandResp.json();
    let genData = await genResp.json();

    if (genData.error) {
        document.getElementById("jsonPreview").textContent = "Error: " + genData.error;
        return;
    }

    renderGrid(expandData.names, expandData.combos);

    lastGeneratedJson = genData.presets_json;
    document.getElementById("jsonPreview").innerHTML = highlightJson(genData.presets_json);

    let total = expandData.names.length;
    let active = genData.num_configure;
    updateStats(active, total - active);
    document.getElementById("presetCount").textContent = active + " preset" + (active !== 1 ? "s" : "");
}

function renderGrid(names, combos) {
    let grid = document.getElementById("matrixGrid");
    grid.innerHTML = "";

    for (let i = 0; i < names.length; i++) {
        let name = names[i];
        let combo = combos[i];
        let isExcluded = excludedPresets.has(name);

        let dims = Object.entries(combo).map(([k, v]) =>
            `<span style="color:#555">${k}=</span>${v}`
        ).join("  ");

        let cell = document.createElement("div");
        cell.className = "matrix-cell " + (isExcluded ? "excluded" : "active");
        cell.innerHTML = `
            <div class="cell-dot"></div>
            <span>${name}</span>
            <span class="cell-hint">${isExcluded ? "click to include" : "click to exclude"}</span>
        `;
        cell.title = Object.entries(combo).map(([k,v]) => k+"="+v).join(" | ");
        cell.onclick = () => togglePreset(name);
        grid.appendChild(cell);
    }
}

function updateStats(active, excluded) {
    document.getElementById("activeCount").textContent = active;
    document.getElementById("excludedCount").textContent = excluded;
    document.getElementById("totalCount").textContent = active + excluded;
}

function highlightJson(jsonStr) {
    let out = jsonStr
        .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");

    // keys
    out = out.replace(/"([^"]+)"(\s*:)/g, '<span class="jk">"$1"</span><span class="jp">$2</span>');
    // string values
    out = out.replace(/:\s*"([^"]*)"/g, (m, v) => ': <span class="js">"' + v + '"</span>');
    // numbers
    out = out.replace(/:\s*(\d+)/g, ': <span class="jn">$1</span>');
    // booleans
    out = out.replace(/:\s*(true|false)/g, ': <span class="jb">$1</span>');

    return out;
}

function copyJson() {
    if (!lastGeneratedJson) return;
    navigator.clipboard.writeText(lastGeneratedJson).then(() => {
        let btn = document.querySelector(".btn-green");
        let orig = btn.textContent;
        btn.textContent = "Copied ✓";
        btn.style.background = "#5a8f00";
        setTimeout(() => { btn.textContent = orig; btn.style.background = ""; }, 1500);
    });
}

function downloadJson() {
    if (!lastGeneratedJson) return;
    let blob = new Blob([lastGeneratedJson], {type: "application/json"});
    let url = URL.createObjectURL(blob);
    let a = document.createElement("a");
    a.href = url;
    a.download = "CMakePresets.json";
    a.click();
    URL.revokeObjectURL(url);
}
</script>

</body>
</html>
